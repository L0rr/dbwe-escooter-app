{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Fahrt beenden</h2>
    <p>Fahrzeug: {{ rental.vehicle.vehicle_code }}</p>
    <p>Gestartet: {{ rental.start_time }}</p>
    <form method="post">
        <label>Gefahrene Kilometer</label>
        <input type="number" step="0.01" name="kilometers" value="1.20" required>
        <p><button class="btn btn-success" type="submit">Rückgabe verarbeiten</button></p>
    </form>
</div>
{% endblock %}
